
<!-- ── BOOKING COMPONENT ── -->
<section id="booking" class="booking">
  <div class="booking-inner">
    <div class="section-label">Kontakt</div>
    <h2 class="section-title">Booking anfragen</h2>
    <p class="section-body">Interesse an einem unvergesslichen Auftritt? Wir freuen uns über jede Anfrage – ob Konzert, Firmenfeier, Hochzeit oder Festival.</p>
    <div class="booking-form">
      <div class="form-row">
        <div class="form-field">
          <label>Name</label>
          <input type="text" placeholder="Ihr Name">
        </div>
        <div class="form-field">
          <label>E-Mail</label>
          <input type="email" placeholder="ihre@email.de">
        </div>
      </div>
      <div class="form-row">
        <div class="form-field">
          <label>Anlass</label>
          <select>
            <option value="">Bitte wählen …</option>
            <option>Konzert</option>
            <option>Hochzeit</option>
            <option>Firmenfeier</option>
            <option>Festival</option>
            <option>Sonstiges</option>
          </select>
        </div>
        <div class="form-field">
          <label>Datum</label>
          <input type="date">
        </div>
      </div>
      <div class="form-field">
        <label>Nachricht</label>
        <textarea placeholder="Erzählen Sie uns von Ihrem Event …"></textarea>
      </div>
      <button class="form-submit">Anfrage senden</button>
    </div>
  </div>
</section>
