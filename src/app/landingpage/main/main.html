  <div class="hero-bg" aria-hidden="true"></div>
  <div class="ring ring1" aria-hidden="true"></div>
  <div class="ring ring2" aria-hidden="true"></div>
  <div class="ring ring3" aria-hidden="true"></div>

  <p class="hero-eyebrow" aria-hidden="true">Blechbläserquintett</p>

  </h1>

    <a [routerLink]="[]" fragment="repertoire" class="btn-secondary">Repertoire entdecken</a>

</section>
